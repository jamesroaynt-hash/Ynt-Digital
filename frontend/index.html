<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YNT ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="assets/css/main.css?v=20260510-icon-gallery">

          </svg>

        </a>

          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 2h2v4H3zM7 2h2v4H7zM11 2h2v4h-2zM3 10h2v4H3zM11 10h2v4h-2z"/><path d="M8 7v3"/>
          </svg>
          RTS Scan
        </a>

        <a class="nav-item" data-page="scanning" onclick="navigateTo('scanning')">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 2h2v4H3zM7 2h2v4H7zM11 2h2v4h-2zM3 10h2v4H3zM7 10h2v4H7zM11 10h2v4h-2z"/>

        </a>

        <div class="nav-section-label" id="nav-section-reports">Reports</div>

            <path d="M5 5.5a2.5 2.5 0 013.8-.3l.7.7a2.5 2.5 0 010 3.6l-.7.7a2.5 2.5 0 01-3.6 0"/><path d="M11 10.5a2.5 2.5 0 01-3.8.3l-.7-.7a2.5 2.5 0 010-3.6l.7-.7a2.5 2.5 0 013.6 0"/>

            <div class="role" id="sidebar-user-role">Administrator</div>

        </div>
        <button onclick="handleLogout()" class="btn btn-ghost btn-sm w-full" style="margin-top:12px; color:rgba(255,255,255,0.4); justify-content:flex-start; gap:8px; padding:8px 4px;">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:14px;height:14px;"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6"/></svg>

    <!-- MAIN CONTENT -->

        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()">

          </button>
          <div class="page-breadcrumb">
            <span style="color:var(--text-muted)">YNT</span>
            <span style="color:var(--text-muted)">›</span>

        <div class="topbar-right">
